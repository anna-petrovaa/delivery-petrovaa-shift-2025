<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="/calculate.css">
</head>
<body>
    <header>
      <div class="header-container">
        <div class="logo">
            <img src="/assets/logo.png" alt="Логотип">
        </div>
        
        <nav>
          
            <a href="/profile.html" class="navigation" >Профиль</a>
              <a href="" class="navigation">История</a>
          
        </nav>
        <button class="button-header">Выйти</button>
      
    </div>
       </header>
       
       <main>
       <section>
        <div class="main-container">
           <div class="upper-container">
            <div class="left-part-upper">
               <h1 class="upper-container-h1">Мы доставим Ваш заказ</h1>
               <span class="upper-container-span">Отправляйте посылки  в приложении Шифт Delivery</span>

                 <div class="left-card">
                    <img class="img-package" src="/assets/package-open.png" alt="Посылка">
                    <img  class="img-qr" src="/assets/QR_koronapay.png" alt="QR code">
                    <span class="left-card-span">Наведите камеру  телефона на <br> QR‑код</span>
                </div>
              </div>

              <div class="right-part-upper">
                <img src="/assets/upper-part.png" alt="Посылка">
              </div>
               
           </div>
                

           <div class="right-container">
              <h2 class="right-container-h2">Рассчитать доставку</h2>

              <form name="deliveryForm" class="form" id="form-id" >
                <div class="form-grid">
                  <div class="form-item">
                  <label for="city-select-first">Город отправки</label>
                   <select class="city-select-send"  name="citySend" id="city-select-first">
                     <option value="">-- Выберите город отправки --</option>
                   </select>
                    <div class="container-span suggestions-send">
                    </div>
                </div>
                <div class="form-item">
                   <label for="city-select">Город назначения</label>
                   <select class="city-select" name="cityReceive" id="city-select">
                     <option value="">-- Выберите город назначения --</option>
                   
                   </select>
                    <div class="container-span suggestions-receive">
                   </div>
                </div>

                
                
                    <div class="form-item">
                    <label for="select-approximate">Размер посылки</label>


                    <select class = "select-approximate" name="select-approximate" id="select-approximate"> 

                    <option value="">-- Выберите размер посылки --</option>
                    </select>
                    
                  

                


                </div>
              </div>

              </form>
              <div class="button-calculate-container">
              <button  class="calculate-form-button" type="submit" form="form-id">Рассчитать</button>
              </div>

              
           </div>
        </div>
       </section>
      </main>

  <script type="module" src="index.mjs"></script>
</body>
</html>
